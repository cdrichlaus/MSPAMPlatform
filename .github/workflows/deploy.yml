name: Deploy to GoDaddy

on:
  workflow_dispatch: # manual trigger only

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Prepare deploy folder
        run: |
          mkdir -p deploy
          cp adminworks-website.html deploy/index.html

      - name: Deploy via FTP
        run: |
          curl -v -T deploy/index.html \
            --resolve "ftp.adminworksllc.com:21:132.148.179.45" \
            --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            --ftp-create-dirs \
            "ftp://ftp.adminworksllc.com/public_html/index.html"
